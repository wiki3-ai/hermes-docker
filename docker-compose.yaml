---
# Hermes Agent - Docker Compose (merged into zulip-docker)
# Docs: https://hermes-agent.nousresearch.com/docs/user-guide/docker
#
# The hermes service has been moved to ../zulip-docker/compose.override.yaml
# so both Zulip and Hermes are managed as a single stack.
#
# Run from the zulip-docker directory:
#   docker compose up -d
#
# To keep running this standalone file (legacy), comment out the
# `networks:` section at the bottom and uncomment the external network
# setup below.

services:
  hermes:
    build:
      context: /media/nvm4t2/Projects/hermes-agent
      dockerfile: Dockerfile
    image: hermes-agent:zulip-test
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # Gateway API (OpenAI-compatible)
      - "9119:9119"   # Web dashboard
    volumes:
      - ~/.hermes:/opt/data
    networks:
      - default
      - zulip
    extra_hosts:
      - "chat.wiki3.ai:host-gateway"
      - "host.docker.internal:host-gateway"
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=jim
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=noisuf88
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=b9fbd1fd66d59cb9f41c666c9a6d5c74ab85a7c1c1c83a87fea2fb43b22db0fb
      # Match host UID so ~/.hermes files stay accessible from both sides
      - PUID=1000
      - PGID=1000
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

networks:
  zulip:
    name: zulip-docker_default
    external: true
